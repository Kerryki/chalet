<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #E8DDC2;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;

  }
  html { background: #E8DDC2; }
  body { min-height: 100vh; min-height: 100dvh; }

  /* hide scrollbars on day-chip strip etc. */
  ::-webkit-scrollbar { display: none; }
  * { scrollbar-width: none; }

  /* prevent text size adjust on rotate */
  html { -webkit-text-size-adjust: 100%; }

  /* tap highlight off */
  * { -webkit-tap-highlight-color: rgba(201,74,44,0.15); }

  button { font: inherit; }
  a { color: inherit; }

  /* splash while React boots */
  #boot {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #F1E8D2; color: #1B3A2D; z-index: 1;
  }
  #boot .t {
    font-family: "DM Serif Display", Georgia, serif; font-size: 56px;
    letter-spacing: -1.2px; line-height: 0.9;
  }
  #root:not(:empty) + #boot { display: none; }
</style>
